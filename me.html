  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-deep:  #07112a;
      --navy:       #0b1a35;
      --navy-mid:   #0f2348;
      --navy-light: #162d5c;
      --navy-mist:  #1e3a70;
      --white:      #ffffff;
      --white-90:   rgba(255,255,255,.90);
      --white-60:   rgba(255,255,255,.60);
      --white-30:   rgba(255,255,255,.30);
      --white-10:   rgba(255,255,255,.10);
      --white-06:   rgba(255,255,255,.06);
      --gold:       #c9a84c;
      --gold-light: #e2c473;
      --gold-dim:   rgba(201,168,76,.25);
      --gold-glow:  rgba(201,168,76,.15);
      --red:        #c0392b;
      --green:      #27ae60;
    }

    html, body {
      min-height: 100%; background: var(--navy);
      font-family: 'DM Sans', sans-serif; color: var(--white); overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(30,58,112,.7) 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
      background-size: cover, 250px;
    }

    /* ── Loading screen ── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 500;
      background: var(--navy);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity .5s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid var(--gold-dim);
      border-top-color: var(--gold);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--white-60); }

    /* ── Cloud status badge ── */
    .cloud-badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 16px 32px 0;
      padding: 7px 14px; border-radius: 50px;
      font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      border: 1px solid; width: fit-content;
    }
    .cloud-badge.online  { color: #2ecc71; border-color: rgba(46,204,113,.3); background: rgba(46,204,113,.07); }
    .cloud-badge.offline { color: var(--white-60); border-color: var(--white-10); background: var(--white-06); }
    .cloud-badge.error   { color: #e74c3c; border-color: rgba(231,76,60,.3); background: rgba(231,76,60,.07); }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* ── Wrapper ── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 420px; margin: 0 auto; padding: 0 0 80px;
      animation: rise .85s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes rise { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

    /* ── Header ── */
    .header {
      position: relative;
      background: linear-gradient(160deg, var(--navy-mist) 0%, var(--navy-mid) 60%, var(--navy-deep) 100%);
      border-bottom: 1px solid var(--gold-dim);
      padding: 52px 32px 40px; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
      width: 260px; height: 160px;
      background: radial-gradient(ellipse, rgba(201,168,76,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .header::after {
      content: ''; position: absolute; bottom: 0; left: 32px; right: 32px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .corner { position: absolute; width: 22px; height: 22px; }
    .corner.tl { top:14px;left:14px;   border-top:1.5px solid var(--gold);    border-left:1.5px solid var(--gold); }
    .corner.tr { top:14px;right:14px;  border-top:1.5px solid var(--gold);    border-right:1.5px solid var(--gold); }
    .corner.bl { bottom:14px;left:14px;  border-bottom:1.5px solid var(--gold-dim); border-left:1.5px solid var(--gold-dim); }
    .corner.br { bottom:14px;right:14px; border-bottom:1.5px solid var(--gold-dim); border-right:1.5px solid var(--gold-dim); }

    .avatar-wrap {
      width:76px;height:76px;border-radius:50%;
      border:2px solid var(--gold);
      box-shadow:0 0 0 4px var(--gold-glow),0 0 24px rgba(201,168,76,.2);
      overflow:hidden;margin-bottom:22px;background:var(--navy-light);
      display:flex;align-items:center;justify-content:center;
      font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold);
    }
    .avatar-wrap img { width:100%;height:100%;object-fit:cover; }
    .name { font-family:'Cormorant Garamond',serif; font-size:clamp(32px,8.5vw,42px); font-weight:300; line-height:1.08; color:var(--white); }
    .name em { font-style:italic; color:var(--gold-light); }
    .title-line   { margin-top:10px;font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--gold); }
    .company-line { margin-top:5px;font-size:13px;font-weight:300;color:var(--white-60);letter-spacing:.05em; }

    /* ── Contact ── */
    .contact-section { padding:0 32px;margin-top:30px;display:flex;flex-direction:column; }
    .contact-item {
      display:flex;align-items:center;gap:16px;padding:13px 0;
      border-bottom:1px solid var(--white-06);
      text-decoration:none;color:inherit;
    }
    .contact-item:last-child { border-bottom:none; }
    .contact-item:hover .ci-value { color:var(--gold-light); }
    .ci-icon { width:36px;height:36px;border-radius:9px;flex-shrink:0;background:var(--white-06);border:1px solid var(--white-10);display:flex;align-items:center;justify-content:center;font-size:15px; }
    .ci-meta { display:flex;flex-direction:column; }
    .ci-label { font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2px; }
    .ci-value { font-size:14px;font-weight:300;color:var(--white-90);transition:color .2s; }

    .divider { margin:26px 32px 0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); }

    .note-block { margin:22px 32px 0;padding:16px 20px;border-left:2px solid var(--gold);background:rgba(201,168,76,.06);border-radius:0 10px 10px 0; }
    .note-block p { font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;font-style:italic;color:var(--white-90);line-height:1.65; }

    /* ── CTA ── */
    .cta-wrap { padding:28px 32px 0;display:flex;flex-direction:column;gap:11px; }
    .btn-save {
      width:100%;padding:17px 24px;border:none;border-radius:12px;
      background:linear-gradient(135deg,var(--gold) 0%,#a87d2a 100%);
      font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
      letter-spacing:.16em;text-transform:uppercase;color:var(--navy-deep);
      cursor:pointer;position:relative;overflow:hidden;
      box-shadow:0 4px 28px rgba(201,168,76,.3);
      transition:transform .15s,box-shadow .15s;
    }
    .btn-save::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%);}
    .btn-save:active{transform:scale(.98);}
    .btn-save:hover{box-shadow:0 6px 36px rgba(201,168,76,.45);}

    .btn-admin {
      width:100%;padding:13px 24px;background:transparent;
      border:1px solid var(--white-10);border-radius:12px;
      font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;
      letter-spacing:.2em;text-transform:uppercase;color:var(--white-60);
      cursor:pointer;transition:border-color .2s,color .2s;
    }
    .btn-admin:hover{border-color:var(--gold-dim);color:var(--gold-light);}

    /* ── QR ── */
    .qr-panel { margin:28px 32px 0;padding:24px 20px;border:1px solid var(--gold-dim);border-radius:16px;background:var(--white-06);display:flex;flex-direction:column;align-items:center;gap:14px; }
    .qr-label { font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold); }
    #qr-code{border-radius:10px;overflow:hidden;}
    #qr-code canvas,#qr-code img{display:block;border-radius:8px;}
    .qr-url{font-size:11px;color:var(--white-60);letter-spacing:.05em;text-align:center;word-break:break-all;}

    .footer{margin-top:40px;text-align:center;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.18);}

    /* ── Toast ── */
    .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:var(--navy-deep);padding:12px 26px;border-radius:50px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;z-index:9999;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* ── Overlay ── */
    .overlay{position:fixed;inset:0;z-index:1000;background:rgba(7,17,42,.88);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
    .overlay.open{opacity:1;pointer-events:all;}

    /* ── PIN ── */
    .pin-modal{background:var(--navy-mid);border:1px solid var(--gold-dim);border-radius:24px 24px 0 0;padding:40px 32px 54px;width:100%;max-width:420px;text-align:center;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);}
    .overlay.open .pin-modal{transform:translateY(0);}
    .pin-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--white);margin-bottom:6px;}
    .pin-sub{font-size:12px;color:var(--white-60);letter-spacing:.08em;margin-bottom:32px;}
    .pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:34px;}
    .pin-dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--white-30);background:transparent;transition:background .15s,border-color .15s;}
    .pin-dot.filled{background:var(--gold);border-color:var(--gold);}
    .pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .3s;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
    .pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;max-width:280px;margin:0 auto;}
    .pin-key{padding:18px;border-radius:12px;background:var(--white-06);border:1px solid var(--white-10);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:300;color:var(--white);cursor:pointer;transition:background .12s,transform .1s;user-select:none;}
    .pin-key:active{background:var(--gold-glow);transform:scale(.92);}
    .pin-key:hover{background:var(--white-10);}
    .pin-key.del{font-size:17px;color:var(--white-60);}
    .pin-key.empty{background:transparent;border:none;cursor:default;}
    .pin-cancel{margin-top:22px;background:none;border:none;font-size:12px;color:var(--white-60);letter-spacing:.15em;text-transform:uppercase;cursor:pointer;display:block;width:100%;transition:color .2s;}
    .pin-cancel:hover{color:var(--white);}

    /* ── Admin Panel ── */
    .admin-panel{background:var(--navy-mid);border:1px solid var(--gold-dim);border-radius:24px 24px 0 0;width:100%;max-width:420px;max-height:92vh;overflow-y:auto;overscroll-behavior:contain;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);display:none;}
    .overlay.open .admin-panel{transform:translateY(0);}
    .admin-panel::-webkit-scrollbar{width:4px;}
    .admin-panel::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px;}
    .admin-header{position:sticky;top:0;z-index:10;background:var(--navy-mid);border-bottom:1px solid var(--white-06);padding:22px 24px 18px;display:flex;align-items:center;justify-content:space-between;}
    .admin-title{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:300;color:var(--white);}
    .admin-title span{color:var(--gold-light);font-style:italic;}

    /* Cloud indicator in admin header */
    .admin-cloud-status{font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:4px 10px;border-radius:50px;border:1px solid;}
    .admin-cloud-status.cloud{color:#2ecc71;border-color:rgba(46,204,113,.35);background:rgba(46,204,113,.08);}
    .admin-cloud-status.local{color:var(--white-60);border-color:var(--white-10);background:var(--white-06);}

    .btn-close{background:none;border:none;color:var(--white-60);font-size:22px;cursor:pointer;padding:4px;line-height:1;transition:color .2s;}
    .btn-close:hover{color:var(--white);}
    .admin-body{padding:10px 24px 40px;}
    .section-label{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin:22px 0 13px;}

    /* Setup box */
    .setup-box{background:rgba(201,168,76,.07);border:1px solid var(--gold-dim);border-radius:12px;padding:16px 18px;margin-bottom:6px;}
    .setup-box p{font-size:12px;color:var(--white-60);line-height:1.7;}
    .setup-box a{color:var(--gold-light);text-decoration:none;}
    .setup-box strong{color:var(--white-90);}

    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
    .field label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--white-60);}
    .field input,.field textarea{background:var(--white-06);border:1px solid var(--white-10);border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;color:var(--white);outline:none;width:100%;transition:border-color .2s,background .2s;}
    .field input::placeholder,.field textarea::placeholder{color:var(--white-30);}
    .field input:focus,.field textarea:focus{border-color:var(--gold);background:var(--gold-glow);}
    .field textarea{resize:vertical;min-height:72px;line-height:1.55;}

    .avatar-preview-row{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
    .avatar-mini{width:50px;height:50px;border-radius:50%;border:1.5px solid var(--gold);box-shadow:0 0 0 3px var(--gold-glow);overflow:hidden;background:var(--navy-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--gold);}
    .avatar-mini img{width:100%;height:100%;object-fit:cover;}
    .hint{font-size:11px;color:var(--white-60);margin:-4px 0 8px;line-height:1.5;}

    .admin-actions{display:flex;flex-direction:column;gap:10px;margin-top:24px;}
    .btn-primary{width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold) 0%,#a87d2a 100%);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--navy-deep);cursor:pointer;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(201,168,76,.25);transition:transform .15s,box-shadow .15s;}
    .btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 55%);}
    .btn-primary:active{transform:scale(.98);}
    .btn-primary:hover{box-shadow:0 6px 28px rgba(201,168,76,.45);}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
    .btn-outline{width:100%;padding:14px;background:transparent;border:1px solid var(--white-10);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:var(--white-60);cursor:pointer;transition:border-color .2s,color .2s;}
    .btn-outline:hover{border-color:var(--gold-dim);color:var(--gold-light);}
    .btn-danger{width:100%;padding:14px;background:transparent;border:1px solid rgba(192,57,43,.3);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:rgba(192,57,43,.65);cursor:pointer;transition:all .2s;}
    .btn-danger:hover{border-color:var(--red);color:var(--red);background:rgba(192,57,43,.07);}

    /* Saving spinner on button */
    .btn-primary.saving::after{content:'';display:inline-block;width:12px;height:12px;border-radius:50%;border:2px solid rgba(0,0,0,.3);border-top-color:#000;animation:spin .7s linear infinite;margin-left:8px;vertical-align:middle;}
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text">Se încarcă cardul…</div>
</div>

<!-- CARD -->
<div class="wrapper">
  <div class="header">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="avatar-wrap" id="avatar"></div>
    <div class="name" id="display-name"></div>
    <div class="title-line" id="display-title"></div>
    <div class="company-line" id="display-company"></div>
  </div>

  <div id="cloud-status-badge"></div>

  <div class="contact-section" id="contact-section"></div>

  <div class="note-block" id="note-block" style="display:none">
    <p id="display-note"></p>
  </div>

  <div class="divider"></div>

  <div class="cta-wrap">
    <button class="btn-save" onclick="downloadVCard()">＋ Adaugă în Agendă</button>
    <button class="btn-admin" onclick="openPinModal()">⚙ Administrare</button>
  </div>

  <div class="qr-panel">
    <div class="qr-label">Distribuie cardul tău</div>
    <div id="qr-code"></div>
    <div class="qr-url" id="qr-url-text"></div>
  </div>

  <div class="footer">Digital Business Card</div>
</div>

<!-- PIN -->
<div class="overlay" id="pin-overlay">
  <div class="pin-modal">
    <div class="pin-title">Acces Administrare</div>
    <div class="pin-sub">Introdu PIN-ul de 4 cifre</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-keypad">
      <div class="pin-key" onclick="pinKey('1')">1</div>
      <div class="pin-key" onclick="pinKey('2')">2</div>
      <div class="pin-key" onclick="pinKey('3')">3</div>
      <div class="pin-key" onclick="pinKey('4')">4</div>
      <div class="pin-key" onclick="pinKey('5')">5</div>
      <div class="pin-key" onclick="pinKey('6')">6</div>
      <div class="pin-key" onclick="pinKey('7')">7</div>
      <div class="pin-key" onclick="pinKey('8')">8</div>
      <div class="pin-key" onclick="pinKey('9')">9</div>
      <div class="pin-key empty"></div>
      <div class="pin-key" onclick="pinKey('0')">0</div>
      <div class="pin-key del" onclick="pinDel()">⌫</div>
    </div>
    <button class="pin-cancel" onclick="closeOverlay('pin-overlay')">Anulează</button>
  </div>
</div>

<!-- ADMIN -->
<div class="overlay" id="admin-overlay">
  <div class="admin-panel" id="admin-panel">
    <div class="admin-header">
      <div class="admin-title">Admin <span>Panel</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="admin-cloud-status" id="admin-cloud-indicator"></span>
        <button class="btn-close" onclick="closeOverlay('admin-overlay')">✕</button>
      </div>
    </div>

    <div class="admin-body">

      <div id="setup-notice"></div>

      <div class="section-label">✦ Identitate</div>
      <div class="avatar-preview-row">
        <div class="avatar-mini" id="admin-avatar-preview">?</div>
        <div class="field" style="flex:1;margin-bottom:0">
          <label>URL Fotografie (opțional)</label>
          <input type="url" id="f-avatarUrl" placeholder="https://…/poza.jpg" oninput="previewAvatar()">
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Prenume</label><input type="text" id="f-firstName" oninput="previewAvatar()"></div>
        <div class="field"><label>Nume</label><input type="text" id="f-lastName" oninput="previewAvatar()"></div>
      </div>
      <div class="field"><label>Titlu / Funcție</label><input type="text" id="f-title"></div>
      <div class="field"><label>Companie / Brand</label><input type="text" id="f-company"></div>

      <div class="section-label">✦ Contact</div>
      <div class="field"><label>Telefon</label><input type="tel" id="f-phone" placeholder="+40 7xx xxx xxx"></div>
      <div class="field"><label>Email</label><input type="email" id="f-email"></div>
      <div class="field"><label>Website (fără https://)</label><input type="text" id="f-website" placeholder="site.ro"></div>
      <div class="field"><label>LinkedIn (fără https://)</label><input type="text" id="f-linkedin" placeholder="linkedin.com/in/…"></div>
      <div class="field"><label>Instagram</label><input type="text" id="f-instagram" placeholder="@username"></div>
      <div class="field"><label>Adresă / Locație</label><input type="text" id="f-address"></div>
      <div class="field"><label>Notă / Descriere</label><textarea id="f-note"></textarea></div>

      <div class="section-label">✦ QR Code</div>
      <div class="field">
        <label>URL pagina cardului</label>
        <input type="url" id="f-pageUrl" placeholder="https://card.site.ro">
      </div>
      <div class="hint">Actualizează cu URL-ul real după hostare.</div>

      <div class="section-label">✦ Securitate PIN</div>
      <div class="field-row">
        <div class="field"><label>PIN nou (4 cifre)</label><input type="password" id="f-pin" maxlength="4" placeholder="••••" inputmode="numeric"></div>
        <div class="field"><label>Confirmă PIN</label><input type="password" id="f-pin2" maxlength="4" placeholder="••••" inputmode="numeric"></div>
      </div>
      <div class="hint">Lasă gol pentru a păstra PIN-ul actual.</div>

      <div class="admin-actions">
        <button class="btn-primary" id="btn-save-admin" onclick="saveAdmin()">✓ Salvează &amp; Actualizează Cardul</button>
        <button class="btn-outline" onclick="downloadQR()">↓ Descarcă QR Code (PNG)</button>
        <button class="btn-danger" onclick="resetToDefaults()">↺ Resetează la valorile implicite</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let CARD = {};
let pinBuffer = '';
const LS_KEY = 'dbc_v1';

// ════════════════════════════════════════════════
//  JSONBIN API
// ════════════════════════════════════════════════
async function cloudLoad() {
  if (!CLOUD_ENABLED) return null;
  const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_API_KEY }
  });
  if (!r.ok) throw new Error('load failed');
  const j = await r.json();
  return j.record;
}

async function cloudSave(data) {
  if (!CLOUD_ENABLED) return false;
  const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_API_KEY
    },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('save failed');
  return true;
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
(async function init() {
  const badge = document.getElementById('cloud-status-badge');

  if (CLOUD_ENABLED) {
    try {
      const remote = await cloudLoad();
      // dacă bin-ul e gol ({}) la prima rulare, populăm cu DEFAULTS
      CARD = (remote && Object.keys(remote).length > 0) ? remote : { ...DEFAULTS };
      if (Object.keys(remote || {}).length === 0) await cloudSave(CARD);
      badge.innerHTML = `<div class="cloud-badge online"><div class="badge-dot"></div>Date live din cloud</div>`;
    } catch(e) {
      // fallback la localStorage
      const saved = localStorage.getItem(LS_KEY);
      CARD = saved ? JSON.parse(saved) : { ...DEFAULTS };
      badge.innerHTML = `<div class="cloud-badge error"><div class="badge-dot"></div>Eroare cloud — date locale</div>`;
    }
  } else {
    const saved = localStorage.getItem(LS_KEY);
    CARD = saved ? JSON.parse(saved) : { ...DEFAULTS };
    badge.innerHTML = `<div class="cloud-badge offline"><div class="badge-dot"></div>Mod local — configurează JSONBin pentru cloud</div>`;
  }

  renderCard();
  document.getElementById('loading-screen').classList.add('hidden');
})();

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
function renderCard() {
  const c = CARD;
  const av = document.getElementById('avatar');
  av.innerHTML = c.avatarUrl
    ? `<img src="${c.avatarUrl}" onerror="this.parentElement.textContent='${initials(c)}'">` 
    : initials(c);

  document.getElementById('display-name').innerHTML = `<em>${esc(c.firstName)}</em>\u00a0${esc(c.lastName)}`;
  document.getElementById('display-title').textContent   = c.title   || '';
  document.getElementById('display-company').textContent = c.company || '';

  const nb = document.getElementById('note-block');
  nb.style.display = c.note ? 'block' : 'none';
  document.getElementById('display-note').textContent = c.note || '';

  const section = document.getElementById('contact-section');
  section.innerHTML = '';
  [
    { icon:'📞', label:'Telefon',   val:c.phone,     href:`tel:${(c.phone||'').replace(/\s/g,'')}` },
    { icon:'✉️', label:'Email',     val:c.email,     href:`mailto:${c.email}` },
    { icon:'🌐', label:'Website',   val:c.website,   href:`https://${c.website}` },
    { icon:'💼', label:'LinkedIn',  val:c.linkedin,  href:`https://${c.linkedin}` },
    { icon:'📸', label:'Instagram', val:c.instagram, href:`https://instagram.com/${(c.instagram||'').replace('@','')}` },
    { icon:'📍', label:'Locație',   val:c.address,   href:null },
  ].forEach(r => {
    if (!r.val) return;
    const el = r.href ? document.createElement('a') : document.createElement('div');
    el.className = 'contact-item';
    if (r.href) { el.href = r.href; el.rel = 'noopener'; }
    el.innerHTML = `<div class="ci-icon">${r.icon}</div><div class="ci-meta"><span class="ci-label">${r.label}</span><span class="ci-value">${esc(r.val)}</span></div>`;
    section.appendChild(el);
  });

  const qrEl = document.getElementById('qr-code');
  qrEl.innerHTML = '';
  document.getElementById('qr-url-text').textContent = c.pageUrl || '';
  if (c.pageUrl) {
    new QRCode(qrEl, { text:c.pageUrl, width:148, height:148, colorDark:'#0b1a35', colorLight:'#f5f0e0', correctLevel:QRCode.CorrectLevel.H });
  }
  document.title = `${c.firstName} ${c.lastName} — Business Card`;
}

// ════════════════════════════════════════════════
//  vCARD DOWNLOAD
// ════════════════════════════════════════════════
function downloadVCard() {
  const c = CARD;
  const lines = ['BEGIN:VCARD','VERSION:3.0',
    `N:${c.lastName};${c.firstName};;;`,`FN:${c.firstName} ${c.lastName}`,
    c.title?`TITLE:${c.title}`:'', c.company?`ORG:${c.company}`:'',
    c.phone?`TEL;TYPE=CELL:${c.phone}`:'', c.email?`EMAIL:${c.email}`:'',
    c.website?`URL:https://${c.website}`:'', c.address?`ADR;TYPE=WORK:;;${c.address};;;;`:'',
    c.note?`NOTE:${c.note}`:'',
    c.linkedin?`X-SOCIALPROFILE;type=linkedin:${c.linkedin}`:'',
    c.instagram?`X-SOCIALPROFILE;type=instagram:${c.instagram}`:'',
    'END:VCARD'].filter(Boolean).join('\r\n');
  triggerDownload(new Blob([lines],{type:'text/vcard;charset=utf-8'}),`${c.firstName}_${c.lastName}.vcf`);
  showToast('✓ Contact descărcat (.vcf)');
}

// ════════════════════════════════════════════════
//  QR DOWNLOAD
// ════════════════════════════════════════════════
function downloadQR() {
  const canvas = document.querySelector('#qr-code canvas');
  if (!canvas) { showToast('⚠ Adaugă mai întâi URL-ul paginii'); return; }
  const S=320,P=28, out=document.createElement('canvas');
  out.width=S+P*2; out.height=S+P*2;
  const ctx=out.getContext('2d');
  ctx.fillStyle='#f5f0e0'; ctx.fillRect(0,0,out.width,out.height);
  ctx.drawImage(canvas,P,P,S,S);
  out.toBlob(blob=>{triggerDownload(blob,'qr-business-card.png');showToast('✓ QR descărcat (PNG)');});
}

// ════════════════════════════════════════════════
//  PIN
// ════════════════════════════════════════════════
function openPinModal() { pinBuffer=''; updateDots(); document.getElementById('pin-overlay').classList.add('open'); }
function pinKey(k) { if(pinBuffer.length>=4)return; pinBuffer+=k; updateDots(); if(pinBuffer.length===4)setTimeout(checkPin,140); }
function pinDel()  { pinBuffer=pinBuffer.slice(0,-1); updateDots(); }
function updateDots() {
  for(let i=0;i<4;i++){const d=document.getElementById('d'+i);d.classList.toggle('filled',i<pinBuffer.length);d.classList.remove('error');}
}
function checkPin() {
  if(pinBuffer===(CARD.adminPin||DEFAULTS.adminPin)){closeOverlay('pin-overlay');openAdmin();}
  else{for(let i=0;i<4;i++){const d=document.getElementById('d'+i);d.classList.remove('filled');d.classList.add('error');}showToast('✗ PIN incorect');pinBuffer='';setTimeout(updateDots,700);}
}

// ════════════════════════════════════════════════
//  ADMIN
// ════════════════════════════════════════════════
function openAdmin() {
  const c = CARD;
  ['firstName','lastName','title','company','phone','email','website','linkedin','instagram','address','note','pageUrl','avatarUrl']
    .forEach(k=>{const el=document.getElementById('f-'+k);if(el)el.value=c[k]||'';});
  document.getElementById('f-pin').value='';
  document.getElementById('f-pin2').value='';

  // Cloud indicator
  const ind = document.getElementById('admin-cloud-indicator');
  ind.textContent = CLOUD_ENABLED ? '☁ Cloud' : '💾 Local';
  ind.className = 'admin-cloud-status ' + (CLOUD_ENABLED ? 'cloud' : 'local');

  // Setup notice
  const notice = document.getElementById('setup-notice');
  if (!CLOUD_ENABLED) {
    notice.innerHTML = `
      <div class="setup-box" style="margin-top:16px">
        <p>
          <strong>Mod local activ.</strong> Modificările se salvează doar pe acest dispozitiv.<br><br>
          Pentru a sincroniza pe orice dispozitiv:<br>
          1. Creează cont gratuit pe <a href="https://jsonbin.io" target="_blank">jsonbin.io</a><br>
          2. Copiază <strong>API Key</strong> + <strong>Bin ID</strong><br>
          3. Lipește în variabilele <code>JSONBIN_API_KEY</code> și <code>JSONBIN_BIN_ID</code> din fișier
        </p>
      </div>`;
  } else { notice.innerHTML = ''; }

  previewAvatar();
  const panel=document.getElementById('admin-panel');
  panel.style.display='block';
  setTimeout(()=>document.getElementById('admin-overlay').classList.add('open'),10);
}

async function saveAdmin() {
  const pin1=document.getElementById('f-pin').value.trim();
  const pin2=document.getElementById('f-pin2').value.trim();
  if(pin1||pin2){
    if(!/^\d{4}$/.test(pin1)){showToast('⚠ PIN-ul trebuie să fie exact 4 cifre');return;}
    if(pin1!==pin2){showToast('⚠ PIN-urile nu coincid');return;}
    CARD.adminPin=pin1;
  }
  ['firstName','lastName','title','company','phone','email','website','linkedin','instagram','address','note','pageUrl','avatarUrl']
    .forEach(k=>{const el=document.getElementById('f-'+k);if(el)CARD[k]=el.value.trim();});

  const btn = document.getElementById('btn-save-admin');
  btn.classList.add('saving'); btn.disabled=true;

  if (CLOUD_ENABLED) {
    try {
      await cloudSave(CARD);
      // actualizăm și badge-ul principal
      document.getElementById('cloud-status-badge').innerHTML =
        `<div class="cloud-badge online"><div class="badge-dot"></div>Date live din cloud</div>`;
    } catch(e) {
      showToast('⚠ Eroare la salvarea în cloud — salvat local');
      localStorage.setItem(LS_KEY, JSON.stringify(CARD));
      btn.classList.remove('saving'); btn.disabled=false; return;
    }
  } else {
    localStorage.setItem(LS_KEY, JSON.stringify(CARD));
  }

  btn.classList.remove('saving'); btn.disabled=false;
  renderCard();
  closeOverlay('admin-overlay');
  showToast(CLOUD_ENABLED ? '✓ Salvat în cloud — vizibil pentru toți!' : '✓ Salvat local pe acest dispozitiv', 3500);
}

async function resetToDefaults() {
  if(!confirm('Ești sigur? Toate modificările vor fi șterse.'))return;
  CARD={...DEFAULTS};
  if(CLOUD_ENABLED){ try{await cloudSave(CARD);}catch(e){} }
  localStorage.removeItem(LS_KEY);
  renderCard(); closeOverlay('admin-overlay');
  showToast('✓ Resetat la valorile implicite');
}

function previewAvatar() {
  const url=(document.getElementById('f-avatarUrl').value||'').trim();
  const fn=(document.getElementById('f-firstName').value||'')[0]||'';
  const ln=(document.getElementById('f-lastName').value||'')[0]||'';
  const ini=(fn+ln).toUpperCase()||'?';
  const prev=document.getElementById('admin-avatar-preview');
  prev.innerHTML=url?`<img src="${url}" onerror="this.parentElement.textContent='${ini}'">`:`${ini}`;
}

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function closeOverlay(id){document.getElementById(id).classList.remove('open');}
function initials(c){return(((c.firstName||'')[0]||'')+((c.lastName||'')[0]||'')).toUpperCase();}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function triggerDownload(blob,name){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);}
function showToast(msg,dur=3200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);}
['pin-overlay','admin-overlay'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target.id===id)closeOverlay(id);});});
</script>
</body>
</html>
