  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-deep  : #07112a;
      --navy       : #0b1a35;
      --navy-mid   : #0f2348;
      --navy-light : #162d5c;
      --navy-mist  : #1e3a70;
      --white      : #ffffff;
      --w90        : rgba(255,255,255,.90);
      --w60        : rgba(255,255,255,.60);
      --w30        : rgba(255,255,255,.30);
      --w10        : rgba(255,255,255,.10);
      --w06        : rgba(255,255,255,.06);
      --gold       : #c9a84c;
      --gold-l     : #e2c473;
      --gold-dim   : rgba(201,168,76,.25);
      --gold-glow  : rgba(201,168,76,.15);
      --red        : #c0392b;
    }

    html, body {
      min-height: 100%;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(30,58,112,.7) 0%, transparent 70%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 600 600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
      background-size: cover, 250px;
    }

    /* ── Loading ── */
    #loading-screen {
      position: fixed; inset: 0; z-index: 500;
      background: var(--navy);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity .5s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid var(--gold-dim); border-top-color: var(--gold);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--w60); }

    /* ── Cloud badge ── */
    .cloud-badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin: 14px 32px 0; padding: 6px 14px; border-radius: 50px;
      font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      border: 1px solid;
    }
    .cloud-badge.online  { color: #2ecc71; border-color: rgba(46,204,113,.3); background: rgba(46,204,113,.07); }
    .cloud-badge.offline { color: var(--w60); border-color: var(--w10); background: var(--w06); }
    .cloud-badge.error   { color: #e74c3c; border-color: rgba(231,76,60,.3); background: rgba(231,76,60,.07); }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* ── Wrapper ── */
    .wrapper {
      position: relative; z-index: 1;
      max-width: 420px; margin: 0 auto; padding: 0 0 80px;
      animation: rise .85s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes rise { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }

    /* ── Header ── */
    .header {
      position: relative;
      background: linear-gradient(160deg, var(--navy-mist) 0%, var(--navy-mid) 60%, var(--navy-deep) 100%);
      border-bottom: 1px solid var(--gold-dim);
      padding: 52px 32px 40px; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
      width: 260px; height: 160px;
      background: radial-gradient(ellipse, rgba(201,168,76,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .header::after {
      content: ''; position: absolute; bottom: 0; left: 32px; right: 32px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .corner { position: absolute; width: 22px; height: 22px; }
    .corner.tl { top:14px;    left:14px;   border-top:1.5px solid var(--gold);     border-left:1.5px solid var(--gold); }
    .corner.tr { top:14px;    right:14px;  border-top:1.5px solid var(--gold);     border-right:1.5px solid var(--gold); }
    .corner.bl { bottom:14px; left:14px;   border-bottom:1.5px solid var(--gold-dim); border-left:1.5px solid var(--gold-dim); }
    .corner.br { bottom:14px; right:14px;  border-bottom:1.5px solid var(--gold-dim); border-right:1.5px solid var(--gold-dim); }

    .avatar-wrap {
      width: 76px; height: 76px; border-radius: 50%;
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 4px var(--gold-glow), 0 0 24px rgba(201,168,76,.2);
      overflow: hidden; margin-bottom: 22px; background: var(--navy-light);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-size: 30px; color: var(--gold);
    }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 8.5vw, 42px); font-weight: 300;
      line-height: 1.08; color: var(--white);
    }
    .name em { font-style: italic; color: var(--gold-l); }
    .title-line   { margin-top: 10px; font-size: 10px; font-weight: 500; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); }
    .company-line { margin-top: 5px;  font-size: 13px; font-weight: 300; color: var(--w60); letter-spacing: .05em; }

    /* ── Contact rows ── */
    .contact-section { padding: 0 32px; margin-top: 30px; display: flex; flex-direction: column; }
    .contact-item {
      display: flex; align-items: center; gap: 16px;
      padding: 13px 0; border-bottom: 1px solid var(--w06);
      text-decoration: none; color: inherit;
    }
    .contact-item:last-child { border-bottom: none; }
    .contact-item:hover .ci-value { color: var(--gold-l); }
    .ci-icon {
      width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
      background: var(--w06); border: 1px solid var(--w10);
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .ci-meta  { display: flex; flex-direction: column; }
    .ci-label { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 2px; }
    .ci-value { font-size: 14px; font-weight: 300; color: var(--w90); transition: color .2s; }

    /* ── Divider ── */
    .divider { margin: 26px 32px 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); }

    /* ── Note ── */
    .note-block { margin: 22px 32px 0; padding: 16px 20px; border-left: 2px solid var(--gold); background: rgba(201,168,76,.06); border-radius: 0 10px 10px 0; }
    .note-block p { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 300; font-style: italic; color: var(--w90); line-height: 1.65; }

    /* ── CTA ── */
    .cta-wrap { padding: 28px 32px 0; display: flex; flex-direction: column; gap: 11px; }

    .btn-save {
      width: 100%; padding: 17px 24px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--gold) 0%, #a87d2a 100%);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      letter-spacing: .16em; text-transform: uppercase; color: var(--navy-deep);
      cursor: pointer; position: relative; overflow: hidden;
      box-shadow: 0 4px 28px rgba(201,168,76,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-save::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 55%); }
    .btn-save:active { transform: scale(.98); }
    .btn-save:hover  { box-shadow: 0 6px 36px rgba(201,168,76,.45); }

    .btn-admin {
      width: 100%; padding: 13px 24px; background: transparent;
      border: 1px solid var(--w10); border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      letter-spacing: .2em; text-transform: uppercase; color: var(--w60);
      cursor: pointer; transition: border-color .2s, color .2s;
    }
    .btn-admin:hover { border-color: var(--gold-dim); color: var(--gold-l); }

    /* ── QR ── */
    .qr-panel {
      margin: 28px 32px 0; padding: 24px 20px;
      border: 1px solid var(--gold-dim); border-radius: 16px; background: var(--w06);
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .qr-label { font-size: 9px; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); }
    #qr-code { border-radius: 10px; overflow: hidden; }
    #qr-code canvas, #qr-code img { display: block; border-radius: 8px; }
    .qr-url { font-size: 11px; color: var(--w60); text-align: center; word-break: break-all; }

    .footer { margin-top: 40px; text-align: center; font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.18); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--gold); color: var(--navy-deep);
      padding: 12px 26px; border-radius: 50px;
      font-size: 13px; font-weight: 500; opacity: 0;
      pointer-events: none; transition: opacity .3s, transform .3s;
      white-space: nowrap; z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Overlay ── */
    .overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(7,17,42,.88); backdrop-filter: blur(8px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ── PIN ── */
    .pin-modal {
      background: var(--navy-mid); border: 1px solid var(--gold-dim);
      border-radius: 24px 24px 0 0; padding: 40px 32px 54px;
      width: 100%; max-width: 420px; text-align: center;
      transform: translateY(100%); transition: transform .4s cubic-bezier(.16,1,.3,1);
    }
    .overlay.open .pin-modal { transform: translateY(0); }
    .pin-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--white); margin-bottom: 6px; }
    .pin-sub   { font-size: 12px; color: var(--w60); letter-spacing: .08em; margin-bottom: 32px; }
    .pin-dots  { display: flex; gap: 14px; justify-content: center; margin-bottom: 34px; }
    .pin-dot   { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid var(--w30); background: transparent; transition: background .15s, border-color .15s; }
    .pin-dot.filled { background: var(--gold); border-color: var(--gold); }
    .pin-dot.error  { background: var(--red);  border-color: var(--red);  animation: shake .3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
    .pin-keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: 11px; max-width: 280px; margin: 0 auto; }
    .pin-key { padding: 18px; border-radius: 12px; background: var(--w06); border: 1px solid var(--w10); font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 300; color: var(--white); cursor: pointer; transition: background .12s, transform .1s; user-select: none; }
    .pin-key:active { background: var(--gold-glow); transform: scale(.92); }
    .pin-key:hover  { background: var(--w10); }
    .pin-key.del    { font-size: 17px; color: var(--w60); }
    .pin-key.empty  { background: transparent; border: none; cursor: default; }
    .pin-cancel     { margin-top: 22px; background: none; border: none; font-size: 12px; color: var(--w60); letter-spacing: .15em; text-transform: uppercase; cursor: pointer; display: block; width: 100%; transition: color .2s; }
    .pin-cancel:hover { color: var(--white); }

    /* ── Admin Panel ── */
    .admin-panel {
      background: var(--navy-mid); border: 1px solid var(--gold-dim);
      border-radius: 24px 24px 0 0; width: 100%; max-width: 420px;
      max-height: 92vh; overflow-y: auto; overscroll-behavior: contain;
      transform: translateY(100%); transition: transform .4s cubic-bezier(.16,1,.3,1);
      display: none;
    }
    .overlay.open .admin-panel { transform: translateY(0); }
    .admin-panel::-webkit-scrollbar { width: 4px; }
    .admin-panel::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    .admin-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--navy-mid); border-bottom: 1px solid var(--w06);
      padding: 22px 24px 18px; display: flex; align-items: center; justify-content: space-between;
    }
    .admin-title { font-family: 'Cormorant Garamond', serif; font-size: 23px; font-weight: 300; color: var(--white); }
    .admin-title span { color: var(--gold-l); font-style: italic; }
    .cloud-chip { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; padding: 4px 10px; border-radius: 50px; border: 1px solid; }
    .cloud-chip.on  { color: #2ecc71; border-color: rgba(46,204,113,.35); background: rgba(46,204,113,.08); }
    .cloud-chip.off { color: var(--w60); border-color: var(--w10); background: var(--w06); }
    .btn-close { background: none; border: none; color: var(--w60); font-size: 22px; cursor: pointer; padding: 4px; line-height: 1; transition: color .2s; }
    .btn-close:hover { color: var(--white); }

    .admin-body { padding: 10px 24px 40px; }
    .sec { font-size: 9px; letter-spacing: .24em; text-transform: uppercase; color: var(--gold); margin: 22px 0 13px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .field label { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--w60); }
    .field input, .field textarea {
      background: var(--w06); border: 1px solid var(--w10); border-radius: 10px;
      padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 300; color: var(--white); outline: none; width: 100%;
      transition: border-color .2s, background .2s;
    }
    .field input::placeholder, .field textarea::placeholder { color: var(--w30); }
    .field input:focus, .field textarea:focus { border-color: var(--gold); background: var(--gold-glow); }
    .field textarea { resize: vertical; min-height: 72px; line-height: 1.55; }
    .hint { font-size: 11px; color: var(--w60); margin: -4px 0 8px; line-height: 1.5; }

    .av-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .av-mini {
      width: 50px; height: 50px; border-radius: 50%;
      border: 1.5px solid var(--gold); box-shadow: 0 0 0 3px var(--gold-glow);
      overflow: hidden; background: var(--navy-light); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-size: 19px; color: var(--gold);
    }
    .av-mini img { width: 100%; height: 100%; object-fit: cover; }

    .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }

    .btn-primary {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--gold) 0%, #a87d2a 100%);
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      letter-spacing: .18em; text-transform: uppercase; color: var(--navy-deep);
      cursor: pointer; position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(201,168,76,.25); transition: transform .15s, box-shadow .15s;
    }
    .btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,.14) 0%, transparent 55%); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:hover  { box-shadow: 0 6px 28px rgba(201,168,76,.45); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary.saving::after { content: ''; display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(0,0,0,.25); border-top-color: #000; animation: spin .7s linear infinite; margin-left: 8px; vertical-align: middle; }

    .btn-outline {
      width: 100%; padding: 14px; background: transparent;
      border: 1px solid var(--w10); border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      letter-spacing: .18em; text-transform: uppercase; color: var(--w60);
      cursor: pointer; transition: border-color .2s, color .2s;
    }
    .btn-outline:hover { border-color: var(--gold-dim); color: var(--gold-l); }

    .btn-danger {
      width: 100%; padding: 14px; background: transparent;
      border: 1px solid rgba(192,57,43,.3); border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 11px;
      letter-spacing: .18em; text-transform: uppercase; color: rgba(192,57,43,.65);
      cursor: pointer; transition: all .2s;
    }
    .btn-danger:hover { border-color: var(--red); color: var(--red); background: rgba(192,57,43,.07); }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text">Se încarcă cardul…</div>
</div>

<!-- ══ CARD ══ -->
<div class="wrapper">
  <div class="header">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="avatar-wrap" id="avatar"></div>
    <div class="name" id="display-name"></div>
    <div class="title-line" id="display-title"></div>
    <div class="company-line" id="display-company"></div>
  </div>

  <div id="cloud-badge-wrap"></div>

  <div class="contact-section" id="contact-section"></div>

  <div class="note-block" id="note-block" style="display:none">
    <p id="display-note"></p>
  </div>

  <div class="divider"></div>

  <div class="cta-wrap">
    <button class="btn-save" onclick="downloadVCard()">＋ Adaugă în Agendă</button>
    <button class="btn-admin" onclick="openPinModal()">⚙ Administrare</button>
  </div>

  <div class="qr-panel">
    <div class="qr-label">Distribuie cardul tău</div>
    <div id="qr-code"></div>
    <div class="qr-url" id="qr-url-text"></div>
  </div>

  <div class="footer">Digital Business Card</div>
</div>

<!-- ══ PIN ══ -->
<div class="overlay" id="pin-overlay">
  <div class="pin-modal">
    <div class="pin-title">Acces Administrare</div>
    <div class="pin-sub">Introdu PIN-ul de 4 cifre</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-keypad">
      <div class="pin-key" onclick="pinKey('1')">1</div>
      <div class="pin-key" onclick="pinKey('2')">2</div>
      <div class="pin-key" onclick="pinKey('3')">3</div>
      <div class="pin-key" onclick="pinKey('4')">4</div>
      <div class="pin-key" onclick="pinKey('5')">5</div>
      <div class="pin-key" onclick="pinKey('6')">6</div>
      <div class="pin-key" onclick="pinKey('7')">7</div>
      <div class="pin-key" onclick="pinKey('8')">8</div>
      <div class="pin-key" onclick="pinKey('9')">9</div>
      <div class="pin-key empty"></div>
      <div class="pin-key" onclick="pinKey('0')">0</div>
      <div class="pin-key del" onclick="pinDel()">⌫</div>
    </div>
    <button class="pin-cancel" onclick="closeOverlay('pin-overlay')">Anulează</button>
  </div>
</div>

<!-- ══ ADMIN ══ -->
<div class="overlay" id="admin-overlay">
  <div class="admin-panel" id="admin-panel">
    <div class="admin-header">
      <div class="admin-title">Admin <span>Panel</span></div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="cloud-chip" id="admin-chip"></span>
        <button class="btn-close" onclick="closeOverlay('admin-overlay')">✕</button>
      </div>
    </div>

    <div class="admin-body">

      <div class="sec">✦ Identitate</div>
      <div class="av-row">
        <div class="av-mini" id="av-preview">?</div>
        <div class="field" style="flex:1;margin-bottom:0">
          <label>URL Fotografie (opțional)</label>
          <input type="url" id="f-avatarUrl" placeholder="https://…/poza.jpg" oninput="prevAvatar()">
        </div>
      </div>
      <div class="row2">
        <div class="field"><label>Prenume</label><input type="text" id="f-firstName" oninput="prevAvatar()"></div>
        <div class="field"><label>Nume</label><input type="text" id="f-lastName" oninput="prevAvatar()"></div>
      </div>
      <div class="field"><label>Titlu / Funcție</label><input type="text" id="f-title"></div>
      <div class="field"><label>Companie / Brand</label><input type="text" id="f-company"></div>

      <div class="sec">✦ Telefoane</div>
      <div class="row2">
        <div class="field"><label>Telefon 1</label><input type="tel" id="f-phone"  placeholder="07xx xxx xxx"></div>
        <div class="field"><label>Telefon 2</label><input type="tel" id="f-phone2" placeholder="07xx xxx xxx"></div>
      </div>

      <div class="sec">✦ Online</div>
      <div class="field"><label>Email</label><input type="email" id="f-email"></div>
      <div class="field"><label>Website 1 (fără https://)</label><input type="text" id="f-website"  placeholder="radupascu.online"></div>
      <div class="field"><label>Website 2 (fără https://)</label><input type="text" id="f-website2" placeholder="avansproiect.online"></div>
      <div class="field"><label>Website 3 (fără https://)</label><input type="text" id="f-website3" placeholder="nutrisibclub.online"></div>
      <div class="field"><label>LinkedIn (fără https://)</label><input type="text" id="f-linkedin" placeholder="linkedin.com/in/…"></div>
      <div class="field"><label>Instagram</label><input type="text" id="f-instagram" placeholder="@username"></div>

      <div class="sec">✦ Altele</div>
      <div class="field"><label>Adresă / Locație</label><input type="text" id="f-address"></div>
      <div class="field"><label>Notă / Motto</label><textarea id="f-note"></textarea></div>

      <div class="sec">✦ QR Code</div>
      <div class="field">
        <label>URL pagina cardului</label>
        <input type="url" id="f-pageUrl" placeholder="https://card.site.ro">
      </div>
      <div class="hint">Actualizează cu URL-ul real după hostare.</div>

      <div class="sec">✦ Securitate PIN</div>
      <div class="row2">
        <div class="field"><label>PIN nou (4 cifre)</label><input type="password" id="f-pin"  maxlength="4" placeholder="••••" inputmode="numeric"></div>
        <div class="field"><label>Confirmă PIN</label>   <input type="password" id="f-pin2" maxlength="4" placeholder="••••" inputmode="numeric"></div>
      </div>
      <div class="hint">Lasă gol pentru a păstra PIN-ul actual.</div>

      <div class="actions">
        <button class="btn-primary" id="btn-save" onclick="saveAdmin()">✓ Salvează &amp; Actualizează Cardul</button>
        <button class="btn-outline" onclick="downloadQR()">↓ Descarcă QR Code (PNG)</button>
        <button class="btn-danger"  onclick="resetDefaults()">↺ Resetează la valorile implicite</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────
let CARD = {};
let pinBuffer = '';
const LS_KEY = 'dbc_v2';

// ── Cloud ──────────────────────────────────────────────────
async function cloudLoad() {
  const r = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID + '/latest', {
    headers: { 'X-Master-Key': JSONBIN_API_KEY }
  });
  if (!r.ok) throw new Error('load ' + r.status);
  const j = await r.json();
  return j.record;
}

async function cloudSave(data) {
  const r = await fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('save ' + r.status);
}

// ── Init ──────────────────────────────────────────────────
(async function init() {
  const badge = document.getElementById('cloud-badge-wrap');
  try {
    const remote = await cloudLoad();
    const hasData = remote && Object.keys(remote).length > 1;
    CARD = hasData ? remote : { ...DEFAULTS };
    if (!hasData) await cloudSave(CARD);
    badge.innerHTML = '<div class="cloud-badge online"><div class="badge-dot"></div>Date live din cloud</div>';
  } catch (e) {
    const saved = localStorage.getItem(LS_KEY);
    CARD = saved ? JSON.parse(saved) : { ...DEFAULTS };
    badge.innerHTML = '<div class="cloud-badge error"><div class="badge-dot"></div>Eroare cloud — date locale</div>';
  }
  renderCard();
  document.getElementById('loading-screen').classList.add('hidden');
})();

// ── Render ─────────────────────────────────────────────────
function renderCard() {
  const c = CARD;

  // Avatar
  const av = document.getElementById('avatar');
  av.innerHTML = c.avatarUrl
    ? '<img src="' + c.avatarUrl + '" onerror="this.parentElement.textContent=\'' + ini(c) + '\'">'
    : ini(c);

  document.getElementById('display-name').innerHTML = '<em>' + esc(c.firstName) + '\u00a0' + esc(c.lastName) + '</em>';
  document.getElementById('display-title').textContent   = c.title   || '';
  document.getElementById('display-company').textContent = c.company || '';

  const nb = document.getElementById('note-block');
  nb.style.display = c.note ? 'block' : 'none';
  document.getElementById('display-note').textContent = c.note || '';

  // Contact rows
  const rows = [
    { icon: '📞', label: 'Telefon 1',  val: c.phone,    href: 'tel:' + (c.phone  || '').replace(/\s/g, '') },
    { icon: '📱', label: 'Telefon 2',  val: c.phone2,   href: 'tel:' + (c.phone2 || '').replace(/\s/g, '') },
    { icon: '✉️', label: 'Email',      val: c.email,    href: 'mailto:' + c.email },
    { icon: '🌐', label: 'Website',    val: c.website,  href: 'https://' + c.website },
    { icon: '🔗', label: 'Website 2',  val: c.website2, href: 'https://' + c.website2 },
    { icon: '🔗', label: 'Website 3',  val: c.website3, href: 'https://' + c.website3 },
    { icon: '💼', label: 'LinkedIn',   val: c.linkedin, href: 'https://' + c.linkedin },
    { icon: '📸', label: 'Instagram',  val: c.instagram,href: 'https://instagram.com/' + (c.instagram || '').replace('@', '') },
    { icon: '📍', label: 'Locație',    val: c.address,  href: null },
  ];

  const section = document.getElementById('contact-section');
  section.innerHTML = '';
  rows.forEach(function(r) {
    if (!r.val) return;
    var el = r.href ? document.createElement('a') : document.createElement('div');
    el.className = 'contact-item';
    if (r.href) { el.href = r.href; el.rel = 'noopener'; }
    el.innerHTML =
      '<div class="ci-icon">' + r.icon + '</div>' +
      '<div class="ci-meta">' +
        '<span class="ci-label">' + r.label + '</span>' +
        '<span class="ci-value">' + esc(r.val) + '</span>' +
      '</div>';
    section.appendChild(el);
  });

  // QR
  var qrEl = document.getElementById('qr-code');
  qrEl.innerHTML = '';
  document.getElementById('qr-url-text').textContent = c.pageUrl || '';
  if (c.pageUrl) {
    new QRCode(qrEl, {
      text: c.pageUrl, width: 148, height: 148,
      colorDark: '#0b1a35', colorLight: '#f5f0e0',
      correctLevel: QRCode.CorrectLevel.H
    });
  }
  document.title = c.firstName + ' ' + c.lastName + ' — Business Card';
}

// ── vCard ──────────────────────────────────────────────────
function downloadVCard() {
  var c = CARD;
  var lines = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:' + c.lastName + ';' + c.firstName + ';;;',
    'FN:' + c.firstName + ' ' + c.lastName,
    c.title   ? 'TITLE:' + c.title   : '',
    c.company ? 'ORG:'   + c.company : '',
    c.phone   ? 'TEL;TYPE=CELL,VOICE:' + c.phone  : '',
    c.phone2  ? 'TEL;TYPE=CELL,VOICE:' + c.phone2 : '',
    c.email   ? 'EMAIL:' + c.email   : '',
    c.website  ? 'URL:'            + 'https://' + c.website  : '',
    c.website2 ? 'URL;type=pref:' + 'https://' + c.website2 : '',
    c.website3 ? 'URL;type=work:' + 'https://' + c.website3 : '',
    c.address ? 'ADR;TYPE=WORK:;;' + c.address + ';;;;' : '',
    c.note    ? 'NOTE:' + c.note   : '',
    c.linkedin  ? 'X-SOCIALPROFILE;type=linkedin:'  + c.linkedin  : '',
    c.instagram ? 'X-SOCIALPROFILE;type=instagram:' + c.instagram : '',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  triggerDL(new Blob([lines], { type: 'text/vcard;charset=utf-8' }), c.firstName + '_' + c.lastName + '.vcf');
  showToast('✓ Contact descărcat (.vcf)');
}

// ── QR download ────────────────────────────────────────────
function downloadQR() {
  var canvas = document.querySelector('#qr-code canvas');
  if (!canvas) { showToast('⚠ Adaugă mai întâi URL-ul paginii'); return; }
  var S = 320, P = 28;
  var out = document.createElement('canvas');
  out.width = S + P * 2; out.height = S + P * 2;
  var ctx = out.getContext('2d');
  ctx.fillStyle = '#f5f0e0';
  ctx.fillRect(0, 0, out.width, out.height);
  ctx.drawImage(canvas, P, P, S, S);
  out.toBlob(function(blob) { triggerDL(blob, 'qr-business-card.png'); showToast('✓ QR descărcat (PNG)'); });
}

// ── PIN ────────────────────────────────────────────────────
function openPinModal() { pinBuffer = ''; updateDots(); document.getElementById('pin-overlay').classList.add('open'); }

function pinKey(k) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += k; updateDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 140);
}

function pinDel() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); }

function updateDots() {
  for (var i = 0; i < 4; i++) {
    var d = document.getElementById('d' + i);
    d.classList.toggle('filled', i < pinBuffer.length);
    d.classList.remove('error');
  }
}

function checkPin() {
  var correct = CARD.adminPin || DEFAULTS.adminPin;
  if (pinBuffer === correct) {
    closeOverlay('pin-overlay');
    openAdmin();
  } else {
    for (var i = 0; i < 4; i++) {
      var d = document.getElementById('d' + i);
      d.classList.remove('filled'); d.classList.add('error');
    }
    showToast('✗ PIN incorect');
    pinBuffer = '';
    setTimeout(updateDots, 700);
  }
}

// ── Admin ──────────────────────────────────────────────────
function openAdmin() {
  var c = CARD;
  var fields = ['firstName','lastName','title','company','phone','phone2','email',
                'website','website2','website3','linkedin','instagram',
                'address','note','pageUrl','avatarUrl'];
  fields.forEach(function(k) {
    var el = document.getElementById('f-' + k);
    if (el) el.value = c[k] || '';
  });
  document.getElementById('f-pin').value  = '';
  document.getElementById('f-pin2').value = '';

  var chip = document.getElementById('admin-chip');
  chip.textContent = CLOUD_ENABLED ? '☁ Cloud activ' : '💾 Local';
  chip.className   = 'cloud-chip ' + (CLOUD_ENABLED ? 'on' : 'off');

  prevAvatar();
  document.getElementById('admin-panel').style.display = 'block';
  setTimeout(function() { document.getElementById('admin-overlay').classList.add('open'); }, 10);
}

async function saveAdmin() {
  var pin1 = document.getElementById('f-pin').value.trim();
  var pin2 = document.getElementById('f-pin2').value.trim();
  if (pin1 || pin2) {
    if (!/^\d{4}$/.test(pin1)) { showToast('⚠ PIN-ul trebuie să fie exact 4 cifre'); return; }
    if (pin1 !== pin2)          { showToast('⚠ PIN-urile nu coincid'); return; }
    CARD.adminPin = pin1;
  }

  var fields = ['firstName','lastName','title','company','phone','phone2','email',
                'website','website2','website3','linkedin','instagram',
                'address','note','pageUrl','avatarUrl'];
  fields.forEach(function(k) {
    var el = document.getElementById('f-' + k);
    if (el) CARD[k] = el.value.trim();
  });

  var btn = document.getElementById('btn-save');
  btn.classList.add('saving'); btn.disabled = true;

  if (CLOUD_ENABLED) {
    try {
      await cloudSave(CARD);
      document.getElementById('cloud-badge-wrap').innerHTML =
        '<div class="cloud-badge online"><div class="badge-dot"></div>Date live din cloud</div>';
    } catch (e) {
      showToast('⚠ Eroare cloud — salvat local');
      localStorage.setItem(LS_KEY, JSON.stringify(CARD));
      btn.classList.remove('saving'); btn.disabled = false;
      return;
    }
  } else {
    localStorage.setItem(LS_KEY, JSON.stringify(CARD));
  }

  btn.classList.remove('saving'); btn.disabled = false;
  renderCard();
  closeOverlay('admin-overlay');
  showToast(CLOUD_ENABLED ? '✓ Salvat în cloud — vizibil pentru toți!' : '✓ Salvat local', 3500);
}

async function resetDefaults() {
  if (!confirm('Ești sigur? Toate datele vor fi resetate.')) return;
  CARD = Object.assign({}, DEFAULTS);
  if (CLOUD_ENABLED) { try { await cloudSave(CARD); } catch(e) {} }
  localStorage.removeItem(LS_KEY);
  renderCard();
  closeOverlay('admin-overlay');
  showToast('✓ Resetat la valorile implicite');
}

function prevAvatar() {
  var url = (document.getElementById('f-avatarUrl').value || '').trim();
  var fn  = (document.getElementById('f-firstName').value || '')[0] || '';
  var ln  = (document.getElementById('f-lastName').value  || '')[0] || '';
  var i   = (fn + ln).toUpperCase() || '?';
  var p   = document.getElementById('av-preview');
  p.innerHTML = url ? '<img src="' + url + '" onerror="this.parentElement.textContent=\'' + i + '\'">' : i;
}

// ── Helpers ────────────────────────────────────────────────
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

function ini(c) { return ((c.firstName || ' ')[0] + (c.lastName || ' ')[0]).toUpperCase(); }

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function triggerDL(blob, name) {
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

function showToast(msg, dur) {
  dur = dur || 3000;
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.classList.remove('show'); }, dur);
}

['pin-overlay', 'admin-overlay'].forEach(function(id) {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target.id === id) closeOverlay(id);
  });
});
</script>
</body>
</html>
