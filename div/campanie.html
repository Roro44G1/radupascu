<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">

<title>AI NAVIGATOR — Campanie Social Media</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #060d1f;
    --navy2:   #0c1a3a;
    --navy3:   #112244;
    --blue:    #1a4a8a;
    --accent:  #4a90d9;
    --gold:    #c9a84c;
    --text:    #c8daee;
    --muted:   #6a8aaa;
    --border:  rgba(99,130,186,0.2);
    --ig:      #E1306C;
    --fb:      #1877F2;
    --th:      #6e6e6e;
    --li:      #0A66C2;
  }

  body {
    background: radial-gradient(ellipse at 20% 10%, #0f2040 0%, #060d1f 60%);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: var(--text);
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #070e22 0%, #0d1e42 100%);
    border-bottom: 1px solid var(--border);
    padding: 22px 32px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: #e8f0ff;
    line-height: 1.15;
  }
  .header-left .subtitle {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-top: 3px;
  }
  .header-right { text-align: right; }
  .header-right .authors { font-size: 11px; color: #5a7a9a; margin-bottom: 3px; }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    background: rgba(99,130,186,0.12);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 6px;
  }

  /* ── LAYOUT ── */
  main { max-width: 900px; margin: 0 auto; padding: 28px 24px 60px; }

  /* ── LABELS ── */
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── DAY TABS ── */
  .day-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
  .day-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(10,20,40,0.4);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .day-btn:hover { border-color: rgba(99,130,186,0.5); color: var(--text); }
  .day-btn.active {
    background: linear-gradient(135deg, rgba(30,70,140,.7), rgba(20,50,100,.7));
    border-color: rgba(160,190,255,.5);
    color: #c8daff;
    font-weight: 600;
  }
  .day-btn .theme { font-size: 10px; color: var(--muted); }
  .day-btn.active .theme { color: #8aa8d8; }

  /* ── PLATFORM TABS ── */
  .platform-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .plat-btn {
    padding: 9px 22px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(10,20,40,0.4);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }
  .plat-btn:hover { color: var(--text); }

  .plat-btn[data-p="facebook"].active   { border-color: #1877F288; background: #1877F218; color: #e8ecff; }
  .plat-btn[data-p="threads"].active    { border-color: #88888888; background: #66666618; color: #e8ecff; }
  .plat-btn[data-p="linkedin"].active   { border-color: #0A66C288; background: #0A66C218; color: #e8ecff; }

  /* ── POST CARD ── */
  .post-header {
    padding: 14px 20px;
    border-radius: 10px 10px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .post-header-info { display: flex; align-items: center; gap: 10px; }
  .post-header-info .icon { font-size: 22px; }
  .post-header-info .day-name { font-weight: 700; color: #d8e8ff; font-size: 14px; }
  .post-header-info .platform-label { font-size: 11px; color: #8aafcf; }

    background: rgba(8,18,38,.7);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 24px;
  }
  .post-text {
    white-space: pre-wrap;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    line-height: 1.75;
    color: #c8daee;
  }

  .img-prompt-block {
    border: 1px solid var(--border);
    border-top: 1px solid rgba(99,130,186,.1);
    border-radius: 0 0 10px 10px;
    background: rgba(5,12,28,.6);
    overflow: hidden;
  }
  .img-prompt-header {
    padding: 11px 20px;
    border-bottom: 1px solid rgba(99,130,186,.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .img-prompt-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .img-prompt-text {
    padding: 14px 20px;
    font-size: 12.5px;
    line-height: 1.65;
    color: #7a9dbf;
    font-style: italic;
    font-family: 'Inter', sans-serif;
  }

  /* ── COPY BUTTON ── */
  .copy-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.08);
    color: rgba(255,255,255,.85);
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .copy-btn:hover { background: rgba(255,255,255,.15); }
  .copy-btn.copied { background: rgba(74,222,128,.18); border-color: #4ade80; color: #4ade80; }
  .copy-btn-dark {
    padding: 5px 13px;
    border-radius: 6px;
    border: 1px solid rgba(99,130,186,.35);
    background: rgba(15,25,50,.5);
    color: #93b4d8;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .copy-btn-dark:hover { background: rgba(30,60,100,.5); }
  .copy-btn-dark.copied { background: rgba(74,222,128,.1); border-color: #4ade80; color: #4ade80; }

  /* ── NAV ARROWS ── */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    gap: 12px;
  }
  .nav-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(10,20,40,.5);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Inter', sans-serif;
  }
  .nav-btn:hover:not(:disabled) { color: var(--text); border-color: rgba(99,130,186,.4); }
  .nav-btn:disabled { opacity: .35; cursor: default; }
  .nav-counter { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #4a6a8a; }

  /* ── OVERVIEW ── */
  .overview {
    margin-top: 36px;
    padding: 20px 24px;
    border-radius: 10px;
    background: rgba(5,12,28,.5);
    border: 1px solid var(--border);
  }
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  .ov-btn {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(60,90,130,.2);
    background: rgba(8,16,34,.3);
    cursor: pointer;
    text-align: left;
    font-family: 'Inter', sans-serif;
    transition: all .15s;
  }
  .ov-btn:hover { border-color: rgba(99,130,186,.4); background: rgba(20,40,80,.3); }
  .ov-btn.active { border-color: rgba(120,160,220,.4); background: rgba(20,45,90,.5); }
  .ov-btn .ov-day { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .ov-btn.active .ov-day { color: var(--accent); }
  .ov-btn .ov-theme { font-size: 13px; color: #6a8aaa; }
  .ov-btn.active .ov-theme { color: #c0d8f8; }
</style>
</head>

      `📖 AI NAVIGATOR a apărut.\n\nPrimul ghid românesc care răspunde simultan la trei întrebări esențiale pentru orice cercetător:\n→ Ce este, de fapt, AI?\n→ Ce îți este permis să folosești?\n→ Cum utilizezi responsabil?\n\n148 de pagini. Etică. Productivitate. Cercetare academică.\n\nScris pentru studenți în ani terminali, doctoranzi și cercetători.\n\n💬 Trimite-mi un mesaj direct pentru achiziție.\n\n#AINavigator #CercetareAcademica #InteligentaArtificiala #EticaAI #Doctorat #Licenta #Disertatie #GhidAcademic #AI2026 #RomaniaAcademica #StudentiRomania #MatrixROM`,
      `⚠️ Realitatea din academia românească în 2026:\n\nChatGPT, Claude, Gemini — folosite pe scară largă.\nÎn tăcere.\nFără niciun cadru.\n\nConsecința? Iluzia competenței: studentul care a generat o introducere academic-sonoră cu AI, dar care nu poate apăra nicio afirmație din ea în fața comisiei.\n\nAI NAVIGATOR trasează linia. Cu precizie.\n\n💬 DM pentru achiziție.\n\n#AINavigator #EticaAI #CercetareAcademica #IntegritateAcademica #AI2026 #StudentiRomania`,
      `💡 Promptul tău naiv produce text plauzibil și raționament împrumutat.\n\nAi nevoie de Cadrul RCSFC:\n→ R — Rol (ce expertiză simulează AI?)\n→ C — Context (ce informații îi oferi?)\n→ S — Sarcină (ce output vrei exact?)\n→ F — Format (cum vrei structurat rezultatul?)\n→ C — Constrângeri (inclusiv etice — integrate, nu opționale)\n\n5 componente. Prompting performant. Etică inclusă de la bun început.\n\nCapitolul 2 — AI NAVIGATOR.\n\n💬 DM pentru achiziție.\n\n#RCSFC #Prompting #AINavigator #CercetareAcademica #AIProductivitate #Doctorat`,

      `🔍 AI-ul a inventat 3 articole din bibliografia ta.\n\nNu știi care.\n\nHalucinațiile bibliografice sunt cea mai periculoasă formă de eroare AI în cercetare: surse inexistente, autori falși, DOI-uri care nu duc nicăieri — toate cu aspect perfect.\n\nToolbox-ul din AI NAVIGATOR:\n→ 8 instrumente de verificare\n→ Protocol în 4 pași\n→ Exercițiul „Detectivul Surselor"\n\nVerificarea nu e opțională. E competență de ordin superior.\n\nCapitolul 4 — AI NAVIGATOR.\n\n💬 DM pentru achiziție.\n\n#FactChecking #HalucinatiiAI #AINavigator #CercetareAcademica #Bibliografie #IntegritateAcademica`,
      `📚 148 de pagini. Iată ce primești:\n\n6 CAPITOLE\n→ Etica AI + AI Act 2024\n→ Cadrul RCSFC de prompting\n→ Matricea celor 7 faze\n→ Toolbox fact-checking (8 instrumente)\n→ Ateliere practice integrate\n→ Ghid pentru doctoranzi + politici editoriale\n\n🛠️ INSTRUMENTE\n→ Termometrul Etic (17 categorii)\n→ Biblioteca de 12 prompturi academice\n→ Tabel comparativ: 7 platforme AI 2026\n→ 5 fișe de lucru printabile\n\n„O carte despre gândire." — Prof. Anca Drăghici, Politehnica Timișoara\n\n💬 DM pentru achiziție.\n\n#AINavigator #CercetareAcademica #Doctorat #AI2026 #GhidAcademic`,
      `📖 AI NAVIGATOR.\nEtică și productivitate în cercetarea academică.\n\ndr.ing. Radu V. Pascu & ș.l.dr.ing. Liliana G. Popescu\nMATRIX ROM, București, 2026\n\n„AI Navigator este o carte despre gândire."\n— Prof. Anca Drăghici, Politehnica Timișoara\n\nDacă ești student în an terminal, doctorand sau cercetător și vrei să știi cum să folosești AI corect, complet și cu integritate academică — această carte este pentru tine.\n\n💬 Trimite-mi un mesaj direct pentru achiziție.\n\n#AINavigator #CercetareAcademica #EticaAI #Doctorat #Licenta #Disertatie #GhidAcademic #InteligentaArtificiala #AI2026 #StudentiRomania #RomaniaAcademica #MatrixROM #IntegritateAcademica #PromptingAI #FactChecking`,

      "Minimalist book cover mockup 'AI NAVIGATOR' on dark navy background, glowing compass rose from circuit board lines, clean academic typography, dramatic lighting, premium editorial feel.",

      "Dramatic book announcement: AI NAVIGATOR cover centered on dark background with spotlight effect, elegant serif quote text overlay, call-to-action 'Disponibil acum — Mesaj direct', premium editorial.",

  facebook: {
    posts: [
      `🎓 AI NAVIGATOR — Etică și productivitate în cercetarea academică a apărut!\n\nDacă ești student în an terminal, doctorand sau cercetător și folosești — sau vrei să folosești — instrumente de inteligență artificială în activitatea ta, această carte a fost scrisă pentru tine.\n\nMediul academic românesc traversează o criză de identitate metodologică: AI-ul este folosit pe scară largă, în tăcere, fără niciun cadru coerent. Nici interdicțiile categorice, nici permisivitatea necondiționată nu funcționează.\n\nAI NAVIGATOR oferă exact ce lipsea: un cadru de înțelegere și acțiune — riguros și aplicabil imediat, la masa de lucru.\n\nScrisă de dr.ing. Radu V. Pascu & ș.l.dr.ing. Liliana G. Popescu. Publicată la MATRIX ROM, București, 2026.\n\n📩 Mesaj direct pentru achiziție.`,
      `Știi care este cel mai frecvent scenariu în universitățile românești în 2026?\n\nStudentul folosește ChatGPT pentru lucrarea de licență. Profesorul nu știe cum să evalueze asta. Instituția nu are un regulament clar. Editorul științific are politici stricte pe care nimeni nu le-a citit. Și toată lumea tace.\n\nAutorii AI NAVIGATOR au numit această situație „iluzia competenței": studentul care a generat o introducere academic-sonoră, dar care nu poate apăra nicio afirmație din ea în fața comisiei de examinare.\n\nNici interdicția categorică, nici permisivitatea necondiționată nu funcționează. Ce lipsea era un cadru.\n\n📩 Mesaj direct pentru AI NAVIGATOR.`,
      `Cel mai frecvent viciu al interacțiunii cu AI în cercetare? Promptul naiv.\n\n„Scrie-mi o introducere pentru lucrarea despre X."\nRezultat: text generic, plauzibil, fără substanță. Raționament împrumutat, nu construit.\n\nCadrul RCSFC din AI NAVIGATOR schimbă asta:\n✔ R — Rolul: calibrarea expertizei simulate\n✔ C — Contextul: furnizarea informațiilor de fundal\n✔ S — Sarcina: specificarea precisă a output-ului dorit\n✔ F — Formatul: structura rezultatului\n✔ C — Constrângerile: limitele etice și calitative — integrate ca element obligatoriu\n\nCartea include și o bibliotecă de 12 prompturi academice calibrate, gata de utilizat pentru fiecare fază a cercetării.\n\n📩 Mesaj direct pentru achiziție.`,
      `Câte dintre aceste utilizări AI sunt permise în lucrarea ta de licență sau doctorat?\n\n→ Reformularea stilistică a unui paragraf propriu\n→ Generarea unui cuprins de la zero\n→ Rezumarea unui articol pe care nu l-ai citit\n→ Traducerea unui text\n→ Inventarea de referințe bibliografice\n\nRăspunsul nu e simplu: depinde de context, de instituție, de editură și de gradul de transparență al declarației tale AI.\n\nTermometrul Etic din AI NAVIGATOR clasifică 17 tipuri de utilizări AI în trei zone — PERMIS, CONDIȚIONAT, INTERZIS — cu criterii explicite pentru fiecare.\n\nNu e un cod de etică pentru raft. E un instrument de decizie în timp real.\n\n📩 Mesaj direct pentru achiziție.`,
      `Ai primit vreodată o referință bibliografică de la AI care arăta perfect — autor, titlu, an, jurnal, volum, pagini — dar care nu exista în realitate?\n\nDacă da, ai întâlnit halucinația bibliografică. Dacă nu, probabil nu ai verificat îndeajuns.\n\nAI-ul nu minte intenționat. Generează text plauzibil — și uneori acea plauzibilitate ia forma unui articol inventat cu toate elementele formale corecte, dar inexistent ca substanță.\n\nCapitolul 4 din AI NAVIGATOR detaliază:\n✔ Anatomia unei halucinații bibliografice (studiu de caz)\n✔ Toolbox academic: 8 instrumente de verificare (Google Scholar, Semantic Scholar, CrossRef, Retraction Watch, PubMed, Unpaywall, DOAJ, ANELISPLUS)\n✔ Protocolul de verificare în 4 pași\n✔ Exercițiul „Detectivul Surselor"\n\n📩 Mesaj direct pentru achiziție.`,
      `Ce găsești în cele 148 de pagini ale AI NAVIGATOR:\n\n📖 CAPITOLELE\n1. Fundamentele etice ale AI + Termometrul Etic (17 categorii)\n2. Cadrul RCSFC + Biblioteca celor 12 prompturi\n3. Matricea celor 7 faze ale lucrării de cercetare\n4. Toolbox de fact-checking: 8 instrumente + Protocol în 4 pași\n5. Ateliere practice integrate\n6. AI în cercetarea doctorală + Politicile editoriale (Elsevier, Springer, IEEE, APA 7) + AI Act UE\n\n🛠️ INSTRUMENTE\n→ Termometrul Etic — 17 categorii de utilizare clasificate\n→ 12 prompturi academice gata de utilizat\n→ Protocol de fact-checking în 4 pași\n→ Tabel comparativ al 7 platforme AI 2026\n→ 5 fișe de lucru printabile\n→ Ghid pentru îndrumătorii de licență/master/doctorat\n→ Model de declarație privind utilizarea AI\n→ Model de regulament instituțional\n\n„O carte despre gândire." — Prof.dr.ing. Anca Drăghici, Politehnica Timișoara\n\n📩 Mesaj direct pentru achiziție.`,

let activeDay = 0;
let activePlatform = 'instagram';

function render() {
  // Day tabs
  const dayTabs = document.getElementById('dayTabs');
  dayTabs.innerHTML = days.map((d, i) => `
    <button class="day-btn ${i === activeDay ? 'active' : ''}" onclick="setDay(${i})">
      <span>${d.icon}</span>
      <span>${d.label}</span>
      <span class="theme">${d.theme}</span>
    </button>
  `).join('');

  // Platform tabs
  const platTabs = document.getElementById('platTabs');
  platTabs.innerHTML = platforms.map(p => `
    <button class="plat-btn ${p.id === activePlatform ? 'active' : ''}" data-p="${p.id}" onclick="setPlatform('${p.id}')">
      ${p.label}
    </button>
  `).join('');

  const d = days[activeDay];
  const p = platforms.find(x => x.id === activePlatform);
  const post = campaign[activePlatform].posts[activeDay];
  const prompt = campaign[activePlatform].prompts[activeDay];

  // Post card
  document.getElementById('postCard').innerHTML = `
    <div class="post-header" style="background: linear-gradient(135deg, ${p.color}35, ${p.color}18); border: 1px solid ${p.color}45; border-bottom: none;">
      <div class="post-header-info">
        <span class="icon">${d.icon}</span>
        <div>
          <div class="day-name">${d.label} — ${d.theme}</div>
          <div class="platform-label">Post pentru ${p.label}</div>
        </div>
      </div>
      <button class="copy-btn" id="copyPostBtn" onclick="copyText('copyPostBtn', ${JSON.stringify(post)})">⎘ Copiază text</button>
    </div>
    <div class="post-body" style="border-left: 1px solid ${p.color}25; border-right: 1px solid ${p.color}25;">
      <pre class="post-text">${escHtml(post)}</pre>
    </div>
    <div class="img-prompt-block">
      <div class="img-prompt-header">
        <span class="img-prompt-label">🎨 Prompt imagine (Midjourney / DALL-E / Canva AI)</span>
        <button class="copy-btn-dark" id="copyPromptBtn" onclick="copyText('copyPromptBtn', ${JSON.stringify(prompt)})">⎘ Copiază prompt</button>
      </div>
      <div class="img-prompt-text">${escHtml(prompt)}</div>
    </div>
  `;

  // Nav
  document.getElementById('prevBtn').disabled = activeDay === 0;
  document.getElementById('nextBtn').disabled = activeDay === days.length - 1;
  document.getElementById('navCounter').textContent = `${activeDay + 1} / ${days.length}`;

  // Overview
  document.getElementById('overviewGrid').innerHTML = days.map((d, i) => `
    <button class="ov-btn ${i === activeDay ? 'active' : ''}" onclick="setDay(${i})">
      <div class="ov-day">${d.label}</div>
      <div class="ov-theme">${d.icon} ${d.theme}</div>
    </button>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setDay(i) { activeDay = i; render(); }
function setPlatform(p) { activePlatform = p; render(); }
function changeDay(d) { activeDay = Math.max(0, Math.min(days.length - 1, activeDay + d)); render(); }

function copyText(btnId, text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    const orig = btn.textContent;
    btn.textContent = '✓ Copiat';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

render();
</script>
